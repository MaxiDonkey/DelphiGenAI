<style>

/* ===================================================== */
/* THEME VARIABLES                                       */
/* ===================================================== */

/* DARK (current default) */

:root {

  --bg-main: #272727;
  --text-main: #ddd;

  --bubble-user-bg: #256EB8;
  --bubble-user-text: #ffffff;

  --bubble-assistant-bg: #2d2d2d;
  --bubble-assistant-text: #ddd;

  --code-container-bg: #1e1e1e;
  --code-border: #444444;
  --code-header-bg: var(--code-container-bg);
  --code-header-text: #f5f5f5;
  --code-header-border: #444;
  --code-language-text: #808080;

  --table-border: #444444;
  --table-header-bg: #333333;
  --table-header-text: #f5f5f5;
  --table-cell-bg: transparent;
  --table-row-even-bg: rgba(255,255,255,0.010);

  --button-copy-bg: #007acc;
  --button-copy-text: #fff;

  --link: #58a6ff;
  --link-visited: #c792ea;
  --link-hover: #1f6feb;
  --link-active: #bf5fff;

  --reasoning-bg: linear-gradient(145deg,#2e2e2e,#2a2a2a);
  --reasoning-border: rgba(255,255,255,0.06);
  --reasoning-text:#d8dbe0;
  --reasoning-text-secondary:#cfd4dc;
  --reasoning-accent:#4c8dff;
  --reasoning-accent-glow:rgba(76,141,255,0.5);
  --reasoning-dots:#7b8088;
  --reasoning-shimmer:rgba(255,255,255,0.02);

  --input-shell-bg: #2f2f2f;
  --input-shell-bg-hover: #3a3a3a;
  --input-shell-border: rgba(255,255,255,0.08);
  --input-shell-shadow: 0 10px 30px rgba(0,0,0,0.35);

  --file-hover-info-bg: var(--input-shell-bg);
  --file-hover-info-border: var(--input-shell-border);
  --file-hover-info-text: var(--bubble-assistant-text);

  --input-menu-bg: #2b2b2b;
  --input-menu-border: rgba(255,255,255,0.08);
  --input-menu-text: #ddd;

  --input-button-bg: #3a3a3a;
  --input-button-text: #ffffff;
  --input-button-hover-bg: #ffffff;
  --input-button-hover-text: #111;
  --input-audio-recording-color: #ff5a5a;

  --input-text: #e8e8e8;
  --input-welcome-text: #f3f3f3;
  --request-params-nav-muted: #717983;
  --request-params-nav-title-inactive: #c2c8d0;

  --input-chip-bg: #3a3a3a;
  --input-chip-text: #ddd;
  --input-indicator-text: #B3DBF8;

  --input-menu-item-hover-bg: rgba(255,255,255,0.08);
  --input-menu-item-hover-text: #ffffff;

  --scrollbar-thumb: #4a4a4a;
  --scrollbar-thumb-hover: #6a6a6a;

  --image-hover-overlay: rgba(0,0,0,0.35);
  --image-hover-icon: #ffffff;

  --layout-left-panel-width: 0px;
  --layout-page-padding: 40px;

  --layout-left-panel-open-width: 300px;
  --layout-left-panel-viewport-margin: 16px;
  --layout-page-horizontal-reserve: 80px;
  --layout-main-content-min-width: 360px;
  --layout-response-max-width: 850px;

  --layout-input-bubble-reserve: 0px;

  --alert-note: #4493f8;
  --alert-tip: #3fb950;
  --alert-important: #ab7df8;
  --alert-warning: #d29922;
  --alert-caution: #f85149;
  --alert-quote: #747c85;

  --inline-code-bg: rgba(255,255,255,0.075);
  --inline-code-text: var(--text-main);
  --inline-code-plain-text: #db9998;
  --inline-code-border: rgba(255,255,255,0.10);

  --floating-controls-right-gap: 0px;
  --prompt-summary-btn-width: 24px;
  --prompt-summary-panel-gap: 8px;

  --input-file-drop-dash-color: rgb(65,65,65);
  --input-file-drop-dash-length: 40px;
  --input-file-drop-dash-thickness: 0px;  /*disabled*/
  --input-file-drop-dash-gap: 28px;
  --input-file-drop-dash-repeat: calc(var(--input-file-drop-dash-length) + var(--input-file-drop-dash-gap));
  --input-file-drop-background: rgba(255,255,255,0.04);
}

/* LIGHT THEME */

[data-theme="light"] {

  --bg-main: #ffffff;
  --text-main: #222;

  --bubble-user-bg: #007acc;
  --bubble-user-text: #ffffff;

  --bubble-assistant-bg: #f1f3f5;
  --bubble-assistant-text: #222;

  --code-container-bg: #ffffff;
  --code-border: #d0d7de;
  --code-header-bg: var(--code-container-bg);
  --code-header-text: #222;
  --code-header-border: #d0d7de;
  --code-language-text: #808080;

  --table-border: #d0d7de;
  --table-header-bg: #f6f8fa;
  --table-header-text: #222222;
  --table-cell-bg: transparent;
  --table-row-even-bg: rgba(0,0,0,0.020);

  --button-copy-bg: #007acc;
  --button-copy-text: #ffffff;

  --link: #0969da;
  --link-visited: #8250df;
  --link-hover: #1f6feb;
  --link-active: #6339d0;

  --reasoning-bg: linear-gradient(145deg,#f5f7fa,#e9edf3);
  --reasoning-border: rgba(0,0,0,0.08);
  --reasoning-text:#1f2328;
  --reasoning-text-secondary:#4b5563;
  --reasoning-accent:#0969da;
  --reasoning-accent-glow:rgba(9,105,218,0.4);
  --reasoning-dots:#9aa4af;
  --reasoning-shimmer:rgba(255,255,255,0.45);

  --input-shell-bg: #eceef1;
  --input-shell-bg-hover: #e2e6ea;
  --input-shell-border: rgba(0, 0, 0, 0.08);
  --input-shell-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);

  --file-hover-info-bg: var(--input-shell-bg);
  --file-hover-info-border: var(--input-shell-border);
  --file-hover-info-text: var(--bubble-assistant-text);

  --input-menu-bg: #f5f6f7;
  --input-menu-border: rgba(0, 0, 0, 0.08);
  --input-menu-text: #1f2937;

  --input-button-bg: #eef0f2;
  --input-button-text: #1f2937;
  --input-button-hover-bg: #1f2937;
  --input-button-hover-text: #ffffff;
  --input-audio-recording-color: #e53935;

  --input-text: #1f2937;
  --input-welcome-text: #6b7280;
  --request-params-nav-muted: #6b7280;
  --request-params-nav-title-inactive: var(--text-main);

  --input-chip-bg: #F6F8FA;
  --input-chip-text: #1f2937;
  --input-indicator-text: #256EB8;

  --input-menu-item-hover-bg: rgba(0, 0, 0, 0.05);
  --input-menu-item-hover-text: #111827;

  --scrollbar-thumb: #c7cdd4;
  --scrollbar-thumb-hover: #9aa4af;

  --image-hover-overlay: rgba(0,0,0,0.15);
  --image-hover-icon: #ffffff;

  --alert-note: #1f6feb;
  --alert-tip: #1a7f37;
  --alert-important: #8250df;
  --alert-warning: #ddaa00;
  --alert-caution: #cf222e;
  --alert-quote: #afb8c1;

  --inline-code-bg: rgba(27,31,35,0.055);
  --inline-code-text: var(--text-main);
  --inline-code-plain-text: #d86b6b;
  --inline-code-border: rgba(27,31,35,0.10);

  --input-file-drop-dash-color: rgb(90,90,90);
}

/* Microphone button while an audio capture is in progress: red, readable on
   both themes. !important wins over the inline color the hover handlers set on
   the button. */
#InputAudioButton.is-recording {
  color: var(--input-audio-recording-color) !important;
}

/* ===================================================== */
/* BASE LAYOUT                                           */
/* ===================================================== */

html,
body {
  min-height: 100vh;
}

body {
  margin: 0;
  padding: var(--layout-page-padding);
  padding-left: calc(var(--layout-page-padding) + var(--layout-left-panel-width));
  box-sizing: border-box;
  overflow-x: hidden;

  font-family: Segoe UI, sans-serif;

  background: var(--bg-main);
  color: var(--text-main);

  transition: padding-left 180ms ease;
}

#InputFileDropZone {
  position: fixed;
  left: 0;
  top: 0;
  width: 100vw;
  height: 100vh;
  display: none;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  border: none;
  border-radius: 0;
  background:
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      top left / var(--input-file-drop-dash-length) var(--input-file-drop-dash-thickness) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      top left / var(--input-file-drop-dash-thickness) var(--input-file-drop-dash-length) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      top right / var(--input-file-drop-dash-length) var(--input-file-drop-dash-thickness) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      top right / var(--input-file-drop-dash-thickness) var(--input-file-drop-dash-length) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      bottom left / var(--input-file-drop-dash-length) var(--input-file-drop-dash-thickness) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      bottom left / var(--input-file-drop-dash-thickness) var(--input-file-drop-dash-length) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      bottom right / var(--input-file-drop-dash-length) var(--input-file-drop-dash-thickness) no-repeat,
    linear-gradient(var(--input-file-drop-dash-color), var(--input-file-drop-dash-color))
      bottom right / var(--input-file-drop-dash-thickness) var(--input-file-drop-dash-length) no-repeat,
    linear-gradient(90deg,
      var(--input-file-drop-dash-color) 0 var(--input-file-drop-dash-length),
      transparent var(--input-file-drop-dash-length) var(--input-file-drop-dash-repeat))
      top left / var(--input-file-drop-dash-repeat) var(--input-file-drop-dash-thickness) repeat-x,
    linear-gradient(90deg,
      var(--input-file-drop-dash-color) 0 var(--input-file-drop-dash-length),
      transparent var(--input-file-drop-dash-length) var(--input-file-drop-dash-repeat))
      bottom left / var(--input-file-drop-dash-repeat) var(--input-file-drop-dash-thickness) repeat-x,
    linear-gradient(180deg,
      var(--input-file-drop-dash-color) 0 var(--input-file-drop-dash-length),
      transparent var(--input-file-drop-dash-length) var(--input-file-drop-dash-repeat))
      top left / var(--input-file-drop-dash-thickness) var(--input-file-drop-dash-repeat) repeat-y,
    linear-gradient(180deg,
      var(--input-file-drop-dash-color) 0 var(--input-file-drop-dash-length),
      transparent var(--input-file-drop-dash-length) var(--input-file-drop-dash-repeat))
      top right / var(--input-file-drop-dash-thickness) var(--input-file-drop-dash-repeat) repeat-y,
    var(--input-file-drop-background);
  opacity: 0;
  pointer-events: none;
  z-index: 3000;
  transition: opacity 120ms ease;
}

html,
body {
  scrollbar-width: auto;
  scrollbar-color: var(--scrollbar-thumb) transparent;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
  width: 16px;
  height: 16px;
}

html::-webkit-scrollbar-track,
body::-webkit-scrollbar-track {
  background: transparent;
}

html::-webkit-scrollbar-thumb,
body::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 999px;
  border: 2px solid transparent;
  background-clip: padding-box;
}

html::-webkit-scrollbar-thumb:hover,
body::-webkit-scrollbar-thumb:hover {
  background: var(--scrollbar-thumb-hover);
  border-radius: 999px;
  border: 2px solid transparent;
  background-clip: padding-box;
}

#ResponseContent {
  width: calc(
    100vw
    - var(--layout-left-panel-width)
    - var(--layout-page-padding)
    - var(--layout-page-padding)
  );
  max-width: var(--layout-response-max-width);
  min-height: calc(
    100vh
    - var(--layout-page-padding)
    - var(--layout-page-padding)
    - var(--layout-input-bubble-reserve, 0px)
  );
  box-sizing: border-box;

  margin-left: auto;
  margin-right: auto;
  margin-bottom: var(--layout-input-bubble-reserve, 0px);
}

#InputBubbleBackdrop {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: var(--layout-input-bubble-reserve, 0px);

  pointer-events: none;
  user-select: none;

  background: var(--bg-main);

  z-index: 999;
}

#InputBubbleBackdrop[hidden] {
  display: none !important;
}

#ResponseContentBatch {
  position: fixed;
  left: -200vw;
  top: 0;

  width: calc(
    100vw
    - var(--layout-left-panel-width)
    - var(--layout-page-padding)
    - var(--layout-page-padding)
  );
  max-width: var(--layout-response-max-width);
  min-height: calc(100vh - var(--layout-page-padding) - var(--layout-page-padding));
  box-sizing: border-box;

  margin: 0;

  visibility: hidden;
  pointer-events: none;
  overflow: hidden;

  contain: layout style paint;
}

html, body,
.chat-bubble, .code-container pre,
.code-header, code, pre {

  font-size:17px !important;
  line-height:1.6;
}

/* ===================================================== */
/* CODE BLOCK                                            */
/* ===================================================== */

.code-container {
  background: var(--code-container-bg, var(--code-header-bg));
}

.code-container pre {
  font-family: "JetBrains Mono","Cascadia Code","Consolas",monospace;

  margin:0;
  padding:1em;

  background:transparent !important;

  overflow-x:auto;
  overflow-y:hidden;

  white-space:pre;
}

.code-header {
  font-family: "JetBrains Mono","Cascadia Code","Consolas",monospace;
  font-size:0.85em;

  padding:0.4em 0.8em;

  background: var(--code-header-bg);
  color: var(--code-header-text);

  border-bottom:none;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.copy-btn {
  font:inherit;
  border:none;

  padding:0.2em 0.6em;
  border-radius:4px;

  background: var(--button-copy-bg);
  color: var(--button-copy-text);

  cursor:pointer;
}

.copy-btn:active {
  transform:scale(0.96);
}

.code-container pre {
  margin:0;
  padding:1em;

  background:transparent !important;

  overflow-x:auto;
  overflow-y:hidden;

  white-space:pre;
}

/* ===================================================== */
/* CHAT BUBBLES                                          */
/* ===================================================== */

.chat-bubble {
  max-width:60%;

  padding:0.6em 0.8em;
  margin:0.3em 0;

  border-radius:10px;

  line-height:1.4;

  white-space:pre-wrap;

  overflow-wrap:anywhere;
  word-break:break-word;
}

.chat-bubble.user {
  margin-left:auto;

  background: var(--bubble-user-bg);
  color: var(--bubble-user-text);
}

.chat-bubble.assistant {
  margin-right:auto;

  background: var(--bubble-assistant-bg);
  color: var(--bubble-assistant-text);
}

.chat-bubble {
  margin:4.2em 0;
}

.chat-bubble + * {
  margin-top:4.2em;
}

/* ===================================================== */
/* PROMPT SELECTOR                                       */
/* ===================================================== */

.prompt-block {
  position: relative;
  width: 100%;
  margin: 3.3em 0;
}

.prompt-bubble {
  margin-top: 0 !important;
  margin-right: 0 !important;
  margin-bottom: 0 !important;
  margin-left: auto !important;
}

.prompt-selector-host {
  position: relative;
  width: 100%;
  height: 0;
  margin-top: 4px;
  overflow: visible;
  pointer-events: none;
}

.prompt-selector {
  position: absolute;
  top: 0;
  right: 0;

  display: inline-flex;
  align-items: center;
  gap: 6px;

  padding: 4px;
  border-radius: 8px;
  border: 1px solid var(--input-shell-border);
  box-sizing: border-box;

  background: var(--bg-main);
  box-shadow: none;

  opacity: 0;
  visibility: hidden;
  transform: translateY(-2px);

  transition:
    opacity 120ms ease 160ms,
    transform 120ms ease 160ms,
    visibility 0s linear 280ms;

  pointer-events: auto;
  z-index: 20;
}

.prompt-block:hover .prompt-selector,
.prompt-selector:hover {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);

  transition:
    opacity 120ms ease,
    transform 120ms ease,
    visibility 0s linear 0s;
}

.prompt-selector-btn {
  appearance: none;
  -webkit-appearance: none;

  width: 40px;
  height: 34px;
  padding: 0;
  margin: 0;

  border: none;
  border-radius: 8px;

  background: transparent;
  color: var(--text-main);

  display: inline-flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  user-select: none;

  font-family: "Segoe Fluent Icons","Segoe Fluent Icons","Segoe UI Symbol","Segoe UI",sans-serif;
  font-size: 18px;
  line-height: 18px;

  transition:
    background 120ms ease,
    color 120ms ease,
    box-shadow 120ms ease,
    transform 120ms ease;
}

.prompt-selector-btn:hover,
.prompt-selector-btn:focus-visible {
  background: var(--input-button-bg);
  color: var(--input-button-text);
  box-shadow: none;
  outline: none;
}

.prompt-selector-btn:active {
  transform: scale(0.94);
}

.prompt-selector-icon {
  display: block;
  width: 18px;
  height: 18px;
  line-height: 18px;
  text-align: center;
  pointer-events: none;
}

/* ===================================================== */
/* DISPLAY SELECTOR                                      */
/* ===================================================== */

.display-block {
  position: relative;
}

.display-selector-host {
  position: relative;
  width: 100%;
  height: 0;
  margin-top: 4px;
  overflow: visible;
  pointer-events: none;
}

.display-selector {
  position: absolute;
  top: 0;
  left: 0;

  display: inline-flex;
  align-items: center;
  gap: 6px;

  padding: 4px;
  border-radius: 8px;
  border: 1px solid var(--input-shell-border);
  box-sizing: border-box;

  background: var(--bg-main);
  box-shadow: none;

  opacity: 0;
  visibility: hidden;
  transform: translateY(-2px);

  transition:
    opacity 120ms ease 160ms,
    transform 120ms ease 160ms,
    visibility 0s linear 280ms;

  pointer-events: auto;
  z-index: 20;
}

.display-block:hover .display-selector,
.display-selector:hover {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);

  transition:
    opacity 120ms ease,
    transform 120ms ease,
    visibility 0s linear 0s;
}

.display-selector-btn {
  appearance: none;
  -webkit-appearance: none;

  width: 40px;
  height: 34px;
  padding: 0;
  margin: 0;

  border: none;
  border-radius: 8px;

  background: transparent;
  color: var(--text-main);

  display: inline-flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;
  user-select: none;

  font-family: "Segoe Fluent Icons","Segoe Fluent Icons","Segoe UI Symbol","Segoe UI",sans-serif;
  font-size: 18px;
  line-height: 18px;

  transition:
    background 120ms ease,
    color 120ms ease,
    box-shadow 120ms ease,
    transform 120ms ease;
}

.display-selector-btn:hover,
.display-selector-btn:focus-visible {
  background: var(--input-button-bg);
  color: var(--input-button-text);
  box-shadow: none;
  outline: none;
}

.display-selector-btn:active {
  transform: scale(0.94);
}

.display-selector-icon {
  display: block;
  width: 18px;
  height: 18px;
  line-height: 18px;
  text-align: center;
  pointer-events: none;
}

/* ===================================================== */
/* LOADING BUBBLE                                        */
/* ===================================================== */

.chat-bubble.assistant.loading {
  position:relative;

  background: var(--bubble-assistant-bg);
  color: var(--bubble-assistant-text);

  overflow:hidden;
}

.chat-bubble.assistant.loading::after {
  content:'';

  position:absolute;
  top:0;
  left:-150%;

  width:50%;
  height:100%;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.2),
    transparent
  );

  animation:shimmer 1.2s infinite;
}

/* ===================================================== */
/* THOUGHT BLOCK                                         */
/* ===================================================== */

.thought-container {
  margin-bottom: 1em;
  border-radius: 10px;

  background: var(--reasoning-bg);
  border: 1px solid var(--reasoning-border);

  overflow: hidden;
}

.thought-header {

      document.documentElement.dataset.theme = "light";

window.setLeftPanelWidth = function (value) {
  const numericValue = Number(value);
  const safeValue = Number.isFinite(numericValue)
    ? Math.max(0, Math.round(numericValue))
    : 0;

  document.documentElement.style.setProperty(
    "--layout-left-panel-width",
    safeValue + "px"
  );

  requestAnimationFrame(function () {
    if (window.updateInputBubbleLayout) {
      window.updateInputBubbleLayout();
    }

    window.dispatchEvent(new Event("resize"));
  });
};

window.ResponseRenderBatch = (function () {
  const VISIBLE_MOUNT_ID = "ResponseContent";
  const BATCH_MOUNT_ID = "ResponseContentBatch";

  const state = {
    active: false,
    scrollTop: 0,
    scrollButtonsWereEnabled: false
  };

  function ensureVisibleMount() {
    let mount = document.getElementById(VISIBLE_MOUNT_ID);

    if (!mount) {
      mount = document.createElement("div");
      mount.id = VISIBLE_MOUNT_ID;
      document.body.appendChild(mount);
    }

    return mount;
  }

  function ensureBatchMount() {
    let mount = document.getElementById(BATCH_MOUNT_ID);

    if (!mount) {
      mount = document.createElement("div");
      mount.id = BATCH_MOUNT_ID;
      mount.setAttribute("aria-hidden", "true");
      document.body.appendChild(mount);
    }

    return mount;
  }

  function getMount() {
    return state.active ? ensureBatchMount() : ensureVisibleMount();
  }

  function getActiveStreamBlock(mount) {
    const targetMount = mount || getMount();

    for (const node of targetMount.children) {
      if (node.nodeType === 1 && node.id === "assistant-stream-block") {
        return node;
      }
    }

    return null;
  }

  function ensureActiveResponse(pairIdValue, className) {
    const mount = getMount();
    const expectedPairId = String(pairIdValue == null ? "" : pairIdValue);

    let block = getActiveStreamBlock(mount);
    let isNewBlock = false;

    if (block && block !== mount.lastElementChild) {
      block.removeAttribute("id");
      block = null;
    }

    if (block && block.dataset && (block.dataset.pairId || "") !== expectedPairId) {
      block.removeAttribute("id");
      block = null;
    }

    if (!block) {
      block = document.createElement("div");
      block.className = className || "assistant-message";
      block.id = "assistant-stream-block";
      mount.appendChild(block);
      isNewBlock = true;
    } else if (className) {
      block.className = className;
    }

    let response = block.querySelector(".assistant-response");

    if (!response) {
      response = document.createElement("div");
      response.className = "assistant-response";
      block.appendChild(response);
    }

    return {
      mount: mount,
      block: block,
      response: response,
      isNewBlock: isNewBlock
    };
  }

  function begin() {
    const batchMount = ensureBatchMount();

    state.scrollTop = Math.max(
      window.pageYOffset || 0,
      document.documentElement.scrollTop || 0,
      document.body.scrollTop || 0
    );

    state.active = true;
    batchMount.replaceChildren();

    document.documentElement.setAttribute("data-response-batch", "active");

    state.scrollButtonsWereEnabled = !!(
      window.__scrollButtonsRuntime &&
      window.__scrollButtonsRuntime.enabled
    );

    if (state.scrollButtonsWereEnabled && typeof window.setScrollButtonsVisible === "function") {
      window.setScrollButtonsVisible(false);
    }

    return batchMount;
  }

  function commit(options) {
    const visibleMount = ensureVisibleMount();
    const batchMount = ensureBatchMount();
    const scrollMode =
      options && options.scrollMode === "bottom"
        ? "bottom"
        : "preserve";

    const nodes = Array.from(batchMount.childNodes);

    visibleMount.style.visibility = "hidden";
    visibleMount.replaceChildren(...nodes);
    batchMount.replaceChildren();

    state.active = false;
    document.documentElement.removeAttribute("data-response-batch");

    requestAnimationFrame(function () {
      if (scrollMode === "bottom") {
        window.scrollTo(0, document.body.scrollHeight);
      } else {
        window.scrollTo(0, state.scrollTop);
      }

      requestAnimationFrame(function () {
        visibleMount.style.visibility = "";

        if (state.scrollButtonsWereEnabled && typeof window.setScrollButtonsVisible === "function") {
          window.setScrollButtonsVisible(true);
        }

        state.scrollButtonsWereEnabled = false;
        window.dispatchEvent(new Event("resize"));
      });
    });

    return visibleMount;
  }

  function cancel() {
    const batchMount = ensureBatchMount();

    batchMount.replaceChildren();
    state.active = false;
    document.documentElement.removeAttribute("data-response-batch");

    if (state.scrollButtonsWereEnabled && typeof window.setScrollButtonsVisible === "function") {
      window.setScrollButtonsVisible(true);
    }

    state.scrollButtonsWereEnabled = false;
  }

  function isActive() {
    return state.active;
  }

  function shouldAutoScroll() {
    return !state.active;
  }

  return {
    begin: begin,
    commit: commit,
    cancel: cancel,
    isActive: isActive,
    shouldAutoScroll: shouldAutoScroll,
    getMount: getMount,
    getActiveStreamBlock: getActiveStreamBlock,
    ensureActiveResponse: ensureActiveResponse
  };
})();

function slugify(text){

  return String(text)

    .trim()
    .toLowerCase()

    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s-]/g,"")
    .replace(/\s+/g,"-")
    .replace(/-+/g,"-");

}

document.addEventListener("click",function(e){

  const a = e.target.closest('a[href^="#"]');
  if(!a) return;

  const raw = a.getAttribute("href");
  const id = decodeURIComponent(raw.substring(1));

  const target = document.getElementById(id);

  if(target){
    e.preventDefault();

    target.scrollIntoView({
      behavior:"smooth",
      block:"start"
    });
  }

});

</script>
